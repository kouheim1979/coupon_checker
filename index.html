function getLocation(){if(!navigator.geolocation){locText.textContent="このブラウザは現在地取得に対応していません。";return}locText.textContent="現在地を取得中です。許可してください。";navigator.geolocation.getCurrentPosition(p=>{pos={lat:p.coords.latitude,lng:p.coords.longitude,acc:Math.round(p.coords.accuracy||0)};localStorage.setItem("coupon_location",JSON.stringify(pos));locText.innerHTML=`取得済み：緯度 ${pos.lat.toFixed(5)} / 経度 ${pos.lng.toFixed(5)} / 精度 約${pos.acc}m<br><span class='muted'>近くの店検索はGoogleマップを開きます。</span>`;nearButtons()},e=>{locText.textContent={1:"位置情報が許可されませんでした。",2:"現在地を取得できませんでした。",3:"現在地取得がタイムアウトしました。"}[e.code]||"現在地取得に失敗しました。"},{enableHighAccuracy:true,timeout:10000,maximumAge:300000})}

window.openMap=t=>{if(!pos){getLocation();return}window.open(`https://www.google.com/maps/search/${encodeURIComponent(t)}/@${pos.lat},${pos.lng},15z`,"_blank","noopener")};
function savedLoc(){try{let p=JSON.parse(localStorage.getItem("coupon_location")||"null");if(p&&p.lat){pos=p;locText.innerHTML=`前回取得：緯度 ${p.lat.toFixed(5)} / 経度 ${p.lng.toFixed(5)}<br><span class='muted'>再取得すると現在地を更新します。</span>`;nearButtons()}}catch(e){}}
document.querySelectorAll(".seg button").forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll(".seg button").forEach(x=>x.classList.toggle("on",x===b));render()});["q","cat","src"].forEach(id=>$(id).addEventListener("input",render));locTop.onclick=getLocation;goLocation.onclick=()=>{searchBox.scrollIntoView({behavior:"smooth"});getLocation()};goSearch.onclick=()=>{searchBox.scrollIntoView({behavior:"smooth"});q.focus()};payLink.href=PAYMENT_CHECKER_URL;file.onchange=e=>{let f=e.target.files[0];if(!f)return;let rd=new FileReader();rd.onload=()=>{try{DB=JSON.parse(rd.result);init()}catch(err){alert("JSONを読み込めませんでした: "+err.message)}};rd.readAsText(f,"utf-8")};savedLoc();fetch("coupon_database.json",{cache:"no-store"}).then(r=>r.ok?r.json():Promise.reject()).then(j=>{DB=j;init()}).catch(init);
</script>
