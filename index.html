function haversineMeters(a,b,c,d){const R=6371000,rad=x=>x*Math.PI/180,dl=rad(c-a),dn=rad(d-b),q=Math.sin(dl/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(dn/2)**2;return Math.round(R*2*Math.atan2(Math.sqrt(q),Math.sqrt(1-q)))}

async function fetchNearbyPlaces(lat,lng,r){let q=`[out:json][timeout:25];(node(around:${r},${lat},${lng})['name'];way(around:${r},${lat},${lng})['name'];relation(around:${r},${lat},${lng})['name'];);out center tags;`,err=null;for(const ep of OVERPASS_ENDPOINTS){try{let ac=new AbortController(),t=setTimeout(()=>ac.abort(),28000),res=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},body:'data='+encodeURIComponent(q),signal:ac.signal});clearTimeout(t);if(!res.ok)throw Error(res.status);return await res.json()}catch(e){err=e}}throw err}
function buildCandidatesFromOsm(json,lat,lng){let seen=new Map();for(const e of json.elements||[]){let tags=e.tags||{},name=tags.name||tags['name:ja']||tags.brand;if(!name||!(tags.shop||tags.amenity||tags.tourism||tags.leisure||tags.cuisine||tags.brand||tags.operator))continue;let la=e.lat??e.center?.lat,lo=e.lon??e.center?.lon;if(typeof la!=='number'||typeof lo!=='number')continue;let m=matchStoreFromText([name,tags.brand,tags.operator].filter(Boolean).join(' ')),dist=haversineMeters(lat,lng,la,lo),key=normalizeText(name)+Math.round(la*10000)+Math.round(lo*10000);seen.set(key,{name,displayName:m?.storeName||name,osmName:name,distance:dist,lat:la,lng:lo,tags,match:m,hasCoupon:!!(m&&m.rows&&m.rows.length)})}return[...seen.values()].sort((a,b)=>a.distance-b.distance).slice(0,30)}
function renderCandidates(cs){nearbyCandidates=cs;candidates.innerHTML=cs.length?cs.map((c,i)=>`<button class='candidate ${c.hasCoupon?'hit':''}' data-c='${i}'><span>🏪 ${esc(c.displayName)} ${c.distance}m <span class='pill ${c.hasCoupon?'ok':'m'}'>${c.hasCoupon?'クーポンあり':'要確認'}</span></span>${normalizeText(c.displayName)!==normalizeText(c.osmName)?`<small>地図上の名称：${esc(c.osmName)}</small>`:''}</button>`).join(''):`<div class='muted'>周辺店舗候補が見つかりませんでした。半径を広げるか、店舗名検索を使ってください。</div>`;document.querySelectorAll('[data-c]').forEach(b=>b.onclick=()=>renderCouponResult(nearbyCandidates[+b.dataset.c],{distance:nearbyCandidates[+b.dataset.c].distance}))}
function genericRowsForStore(n){return[{店舗名:n,ブランド名:n,カテゴリ大:'未分類',カテゴリ小:'周辺店舗',優待元:'公式アプリ / 公式サイト',優待元種別:'確認候補',優待ステータス:'要手動確認',優先度:'1. まず見る',信頼度:'未確認',確認方法:'店舗公式アプリ、公式サイト、店頭掲示を確認',確認URL:'未確認',アプリ名:'未確認',提示タイミング:'会計前',使う前の操作:'会計前にクーポン、会員証、ポイント提示条件を確認',支払いとの関係:'支払い前に条件確認',併用注意:'併用条件要確認',最終確認日:'未確認',メモ:'DB未登録の店舗です。公式、PayPayクーポン、楽天ペイ、d払い、au PAY、LINEクーポン、Yahoo! JAPANアプリ、JAF、クラブオフ、SmartNews等を確認候補として見てください。'}]}
function renderCouponResult(store,ctx={}){let m=store.match||matchStoreFromText(store.name||store.storeName||store.店舗名),rows=(m?.rows&&m.rows.length)?m.rows:genericRowsForStore(store.displayName||store.name||store.storeName||store.店舗名),name=m?.storeName||store.displayName||store.name||store.storeName||store.店舗名;localStorage.setItem('lastSelectedCouponStore',name);let stat=rows.some(r=>r.優待ステータス==='あり')?'クーポンの掲載候補あり':'要確認',dist=ctx.distance!=null?ctx.distance+'m':'手入力検索',sum=rows.slice().sort((a,b)=>pn(a.優先度)-pn(b.優先度)).slice(0,5).map((r,i)=>`<div class='sumitem'><b>${i+1}位: ${esc(r.優待元)}</b><br><span class='muted'>${esc(r.確認方法)} / ${esc(r.メモ||'会計前に確認してください。')}</span></div>`).join('');selectedResult.innerHTML=`<div class='selected'><h3>選択店舗：${esc(name)}</h3><div class='muted'><span class='pill ok'>${esc(stat)}</span> <span class='pill'>距離：${esc(dist)}</span></div><div class='summary'><b>クーポン確認順:</b>${sum}<div class='sumitem'><b>使い方</b><br><span class='muted'>レジ前に公式アプリや会員優待、決済クーポンの取得条件を確認。モバイルオーダーや事前購入の場合は、アプリ内で適用可否を確認してください。</span></div><div class='sumitem'><b>注意</b><br><span class='muted'>店舗限定・時間限定・アプリ限定・会員限定のクーポンがあるため、会計前に確認してください。クーポンが常にあるとは限らないため、確認候補として表示しています。</span></div></div></div>`;q.value=name;render();selectedResult.scrollIntoView({behavior:'smooth',block:'start'})}
async function startNearbySearch(){if(!navigator.geolocation){setStatus('このブラウザは位置情報に対応していません。店舗名検索を使ってください。','error');return}setStatus('📍 位置情報を取得中です。ブラウザの許可ダイアログが出たら許可してください。','warn');candidates.innerHTML='';navigator.geolocation.getCurrentPosition(async p=>{pos={lat:p.coords.latitude,lng:p.coords.longitude};setStatus('📡 現在地を取得しました。周辺店舗を探しています。','ok');try{let osm=await fetchNearbyPlaces(pos.lat,pos.lng,+radius.value||250),cs=buildCandidatesFromOsm(osm,pos.lat,pos.lng);setStatus(`📡 現在地を取得しました。周辺店舗候補 ${cs.length}件を表示しています。今いる店舗を選んでください。`,'ok');renderCandidates(cs)}catch(e){setStatus('周辺店舗候補の取得に失敗しました。店舗名検索を使ってください。','error')}},e=>{setStatus({1:'位置情報の許可が拒否されました。店舗名検索を使ってください。',2:'現在地を特定できませんでした。屋内や地下では失敗することがあります。',3:'位置情報取得がタイムアウトしました。もう一度試すか、店舗名検索を使ってください。'}[e.code]||'位置情報を取得できませんでした。店舗名検索を使ってください。','error')},{enableHighAccuracy:true,timeout:10000,maximumAge:0})}
function searchManual(k){q.value=k||q.value;let m=matchStoreFromText(q.value);m?renderCouponResult({storeName:m.storeName,match:m}):render()}
function init(){let r=getRows(),cats=[...new Set(r.map(x=>x.カテゴリ大).filter(Boolean))].sort(),srcs=[...new Set(r.map(x=>x.優待元).filter(Boolean))].sort();cat.innerHTML=`<option value=''>カテゴリすべて</option>`+cats.map(x=>`<option>${esc(x)}</option>`).join('');src.innerHTML=`<option value=''>優待元すべて</option>`+srcs.map(x=>`<option>${esc(x)}</option>`).join('');quick.innerHTML=['マック','ガスト','無印','オーケー','ロピア','サンドラッグ','ウエルシア','ローソン','丸亀製麺','映画館','JAF会員優待','Club Off'].map(x=>`<button class='chip' data-q='${esc(x)}'>${esc(x)}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>searchManual(b.dataset.q));let last=localStorage.getItem('lastSelectedCouponStore');if(last&&!q.value)q.value=last;render()}
function match(r){let s=normalizeText(q.value);if(cat.value&&r.カテゴリ大!==cat.value)return false;if(src.value&&r.優待元!==src.value)return false;if(!s)return true;let target=mode==='store'?rowNames(r):mode==='category'?[r.カテゴリ大,r.カテゴリ小]:mode==='source'?[r.優待元,r.優待元種別]:[buildSearchableText(r)];return normalizeText(target.join(' ')).includes(s)||rowNames(r).some(x=>normalizeText(x).includes(s)||s.includes(normalizeText(x)))}
function group(list){let m=new Map();list.forEach(r=>{let k=r.店舗名||r.ブランド名||r.store||'未分類';if(!m.has(k))m.set(k,[]);m.get(k).push(r)});return[...m.entries()].map(([name,items])=>({name,items:items.sort((a,b)=>pn(a.優先度)-pn(b.優先度)||sr(a.優待ステータス)-sr(b.優待ステータス))})).sort((a,b)=>a.name.localeCompare(b.name,'ja'))}

function storeHtml(g){let f=g.items[0]||{},on=favs.includes(g.name);return `<article class='store'><div class='storeHead'><div><div class='name'>${esc(g.name)}</div><div class='meta'>${esc(f.カテゴリ大||'')} / ${esc(f.カテゴリ小||'')} ・ 確認先 ${g.items.length}件</div></div><button class='fav ${on?'on':''}' data-fav='${esc(g.name)}'>${on?'★ よく使う':'☆ よく使う'}</button></div><div class='flow'>${g.items.map((r,i)=>itemHtml(r,i+1)).join('')}</div><div class='pay'>最後に <b>支払いチェッカー</b> で決済方法を確認。クーポン取得 → 会員証/ポイント提示 → 優待提示 → 支払い、の順番を崩さないようにします。</div></article>`}
