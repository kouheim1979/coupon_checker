      <div class="footerNav">

        <button id="showFav" class="ghost">よく使う店</button>
      </div>
    </div>
    <div class="card">
      <label>DB読込</label>
      <input id="file" type="file" accept=".json,application/json">
      <p class="muted">同じフォルダの <b>coupon_database.json</b> を自動読込します。失敗時は内蔵サンプルDBで動きます。</p>

    </div>
  </section>

  </section>

  <main class="results" id="results"></main>
</div>

let DB=EMBEDDED_DB;let favs=JSON.parse(localStorage.getItem('coupon_favs')||'[]');
const $=id=>document.getElementById(id);const norm=v=>(v||'').toString().toLowerCase().trim();
function parseDate(s){const d=new Date((s||'').replaceAll('/','-'));return isNaN(d)?null:d}
function oldFlag(row){const d=parseDate(row.最終確認日);if(!d)return true;return (Date.now()-d.getTime())/86400000>180}
function priorityNum(v){const m=(v||'').match(/^(\d+)/);return m?Number(m[1]):9}
function statusRank(v){return {'あり':1,'可能性あり':2,'要手動確認':3,'なし':4}[v]||5}
function initFilters(){const rows=DB.coupon_db||[];const cats=[...new Set(rows.map(r=>r.カテゴリ大).filter(Boolean))].sort();const srcs=[...new Set(rows.map(r=>r.優待元).filter(Boolean))].sort();$('cat').innerHTML='<option value="">すべて</option>'+cats.map(x=>`<option>${esc(x)}</option>`).join('');$('src').innerHTML='<option value="">すべて</option>'+srcs.map(x=>`<option>${esc(x)}</option>`).join('');$('quick').innerHTML=['サンドラッグ','ウエルシア','マクドナルド','丸亀製麺','映画館','カラオケ','温浴施設','JAF会員優待','Club Off'].map(x=>`<button class="chip" data-q="${esc(x)}">${esc(x)}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{$('q').value=b.dataset.q;render()})}
function esc(s){return (s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function matchRow(r,q,cat,src){const text=norm(Object.values(r).join(' '));return (!q||text.includes(norm(q)))&&(!cat||r.カテゴリ大===cat)&&(!src||r.優待元===src)}
function groupRows(rows){const map=new Map();for(const r of rows){const k=r.店舗名||r.ブランド名||'未分類';if(!map.has(k))map.set(k,[]);map.get(k).push(r)}return [...map.entries()].map(([name,items])=>({name,items:items.sort((a,b)=>priorityNum(a.優先度)-priorityNum(b.優先度)||statusRank(a.優待ステータス)-statusRank(b.優待ステータス))})).sort((a,b)=>a.name.localeCompare(b.name,'ja'))}
function render(){const q=$('q').value,cat=$('cat').value,src=$('src').value;let rows=(DB.coupon_db||[]).filter(r=>matchRow(r,q,cat,src));if(window.onlyFav){rows=rows.filter(r=>favs.includes(r.店舗名))}$('count').textContent=rows.length;const groups=groupRows(rows);$('results').innerHTML=groups.length?groups.map(g=>storeHtml(g)).join(''):'<div class="card empty">該当なし。店名をひらがな・カタカナ・略称でも試してください。</div>'}
function storeHtml(g){const first=g.items[0]||{};const isFav=favs.includes(g.name);return `<article class="store"><div class="storeHead"><div><div class="storeTitle">${esc(g.name)}</div><div class="storeSub">${esc(first.カテゴリ大||'')} / ${esc(first.カテゴリ小||'')} ・ ${g.items.length}件</div></div><button class="${isFav?'danger':'ghost'}" onclick="toggleFav('${esc(g.name)}')">${isFav?'よく使う店から外す':'よく使う店に追加'}</button></div><div class="items">${g.items.map(itemHtml).join('')}</div><div style="padding:0 14px 14px"><div class="notice"><b>支払い：</b>クーポン・会員証・ポイント提示を確認したあと、支払いチェッカーアプリで決済方法を確認。</div></div></article>`}
function itemHtml(r){const re=oldFlag(r)?'<span class="badge recheck">要再確認</span>':'';const url=r.確認URL&&r.確認URL!=='未確認'?`<a class="link" href="${esc(r.確認URL)}" target="_blank" rel="noopener">確認URLを開く</a>`:'未確認';return `<div class="item"><div class="itemTop"><div class="source">${esc(r.優待元)}</div><div class="badges"><span class="badge priority">${esc(r.優先度)}</span><span class="badge status-${esc(r.優待ステータス)}">${esc(r.優待ステータス)}</span>${re}</div></div><div class="detail"><b>種別</b><span>${esc(r.優待元種別)}</span><b>確認方法</b><span>${esc(r.確認方法)}</span><b>提示タイミング</b><span>${esc(r.提示タイミング)}</span><b>使う前の操作</b><span>${esc(r.使う前の操作)}</span><b>注意</b><span>${esc(r.併用注意)} / ${esc(r.メモ)}</span><b>最終確認日</b><span>${esc(r.最終確認日)}</span><b>リンク</b><span>${url}</span></div></div>`}
window.toggleFav=name=>{favs=favs.includes(name)?favs.filter(x=>x!==name):[...favs,name];localStorage.setItem('coupon_favs',JSON.stringify(favs));render()};
['q','cat','src'].forEach(id=>$(id).addEventListener('input',()=>{window.onlyFav=false;render()}));$('clear').onclick=()=>{$('q').value='';$('cat').value='';$('src').value='';window.onlyFav=false;render()};$('showFav').onclick=()=>{window.onlyFav=!window.onlyFav;render()};$('file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{DB=JSON.parse(rd.result);initFilters();render()}catch(err){alert('JSONを読み込めませんでした: '+err.message)}};rd.readAsText(f,'utf-8')});
fetch('coupon_database.json',{cache:'no-store'}).then(r=>r.ok?r.json():Promise.reject()).then(j=>{DB=j;initFilters();render()}).catch(()=>{initFilters();render()});
