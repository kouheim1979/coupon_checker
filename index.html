<!doctype html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>クーポンチェッカー</title><style>:root{--bg:#FFFDE7;--p:#FF2D6B;--c:#00E5FF;--y:#FFE600;--g:#9CFF97;--d:#1A1A1A;--b:3px solid #1A1A1A;--s:5px 5px 0 #1A1A1A}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:system-ui,'Noto Sans JP',sans-serif;font-weight:800;color:var(--d)}button,input,select,a{font:inherit}.app{max-width:920px;margin:auto;padding:12px 12px 112px}.top{position:sticky;top:0;z-index:5;margin:0 -12px;padding:12px;background:var(--p);border-bottom:4px solid var(--d);color:#fff}.bar{display:flex;align-items:center;justify-content:space-between;gap:10px}.ttl{font-size:28px;text-shadow:2px 2px #000}.box,.btn,input,select,.bubble,.result,.bottom button,.bottom a{border:var(--b);border-radius:12px;box-shadow:var(--s);background:#fff}.hero{background:var(--p);color:#fff}.box{padding:14px;margin-top:14px}.hero h1{margin:0 0 8px;font-size:28px;text-shadow:2px 2px #000}.btn{min-height:48px;padding:10px 14px;background:var(--c);font-weight:900}.search{display:flex;gap:8px}.search input{width:100%;min-height:52px;padding:12px;font-size:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}select{min-height:52px;padding:12px}.chips,.bubbles{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.chip,.bubble{padding:10px 12px}.chip{background:var(--y)}.bubble{text-align:left;font-weight:900}.bubble.hit{background:var(--g)}.bubble.tour{background:#dff8ff}.bubble small{display:block;font-size:12px;margin-top:3px}.status{padding:10px;margin-top:10px}.ok{background:#E8FBFF}.warn{background:#fff6c4}.err{background:#FFB3C7}.pill{display:inline-block;border:2px solid var(--d);border-radius:999px;padding:2px 8px;background:var(--y);font-size:12px}.pill.has{background:var(--g)}.pill.maybe{background:var(--y)}.pill.manual{background:#9CF5FF}.nm{display:inline-block;padding:1px 6px;border-radius:8px;border:2px solid var(--d);box-shadow:2px 2px 0 var(--d)}.nm.has{background:var(--g);color:#064e16}.nm.maybe{background:var(--y);color:#7c2d12}.nm.manual{background:#9CF5FF;color:#083344}.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.result{padding:14px;margin-top:14px}.result h2{margin:0 0 8px;font-size:24px}.src{border:2px solid var(--d);border-radius:10px;padding:10px;margin-top:8px;background:#fffdf5;line-height:1.6}.src .pill{float:right;margin-left:8px}.bottom{position:fixed;left:0;right:0;bottom:0;max-width:920px;margin:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:rgba(255,253,231,.96);border-top:4px solid var(--d);padding:8px}.bottom button,.bottom a{text-align:center;padding:10px;color:var(--d);text-decoration:none;font-weight:900}.bottom a{background:var(--p);color:#fff}@media(max-width:520px){.grid{grid-template-columns:1fr}.ttl{font-size:22px}.bubble{width:100%}.search{display:block}.search button{width:100%;margin-top:8px}}</style></head><body><div class='app'><header class='top'><div class='bar'><div><div class='ttl'>🎟️ クーポンチェッカー</div><div>支払い前に見る優待入口</div></div><button class='btn' id='locTop'>📍 現在地から探す</button></div></header><section class='box hero'><h1>この店、先に何を見る？</h1><p>公式アプリ → 会員優待 → 前売り券 → 決済クーポンの順で確認します。</p></section><section class='box' id='searchBox'><div class='search'><input id='q' placeholder='例：マック、無印、八景島、水族館、遊園地'><button class='btn' id='manualBtn'>検索</button></div><div class='grid'><label>検索対象<select id='target'><option value='all' selected>全部：お店＋観光・入場料</option><option value='shop'>お店・飲食・買い物</option><option value='tourism'>観光・入場料・レジャー</option></select></label><label>検索半径<select id='radius'><option value='120'>120m：今いる建物付近</option><option value='250' selected>250m：近くのお店</option><option value='500'>500m：駅前・商業施設向け</option><option value='800'>800m：広めに探す</option></select></label></div><button class='btn' id='near' style='width:100%;margin-top:10px'>📍 現在地から探す</button><div class='legend'><span class='nm has'>あり</span><span class='nm maybe'>可能性あり</span><span class='nm manual'>要確認</span></div><div id='status' class='status'>未取得。現在地を許可すると、近くのお店・観光施設候補を表示します。</div><div id='bubbles' class='bubbles'></div><div class='chips' id='chips'></div></section><section id='result'></section></div><nav class='bottom'><button id='goSearch'>🔎<br>検索</button><button id='goLoc'>📍<br>現在地</button><a href='https://kouheim1979.github.io/' target='_blank'>💳<br>支払いへ</a></nav><script>const EP=['https://overpass-api.de/api/interpreter','https://overpass.kumi.systems/api/interpreter'];const P={'マクドナルド':{a:['マック','マクド','mcdonalds'],type:'shop',s:[['マクドナルド公式アプリ','あり','アプリクーポンとモバイルオーダー適用可否を確認'],['SmartNewsクーポン','可能性あり','掲載されることがあるため確認'],['Yahoo! JAPANアプリ / LINEクーポン','可能性あり','不定期掲載の確認候補'],['決済アプリクーポン','要確認','支払い前に確認']],u:'注文前に公式アプリのクーポンを確認。',w:'時間限定・モバイルオーダー限定に注意。'},'ローソン':{a:['lawson'],type:'shop',s:[['ローソンアプリ','あり','アプリクーポンとお試し引換券を確認'],['Ponta / dポイント','可能性あり','ポイントカード提示前に確認'],['決済アプリクーポン','要確認','支払い前に確認']],u:'会計前にローソンアプリを確認。',w:'対象商品限定・先着に注意。'},'サンドラッグ':{a:['サンドラ','sundrug'],type:'shop',s:[['サンドラッグ公式アプリ','あり','アプリクーポンと会員バーコードを確認'],['JAF会員優待','可能性あり','JAFナビで店名検索'],['Club Off','要確認','ログイン後にカテゴリ検索'],['決済アプリクーポン','要確認','支払い前に確認']],u:'レジ前に公式アプリ、会員証、決済クーポンを確認。',w:'アプリ内限定・店舗限定に注意。'},'ウエルシア':{a:['ウェルシア','welcia'],type:'shop',s:[['ウエルシアグループアプリ','あり','アプリクーポンと会員証を確認'],['Vポイント / WAON POINT','可能性あり','ポイント条件を確認'],['決済アプリクーポン','要確認','支払い前に確認']],u:'公式アプリ、ポイント、決済クーポンの順で確認。',w:'ポイント倍率日と併用条件に注意。'},'ガスト':{a:['すかいらーく','gusto'],type:'shop',s:[['すかいらーくアプリ','あり','クーポン番号を確認'],['SmartNews / Yahoo! JAPANアプリ','可能性あり','不定期掲載の確認候補'],['JAF / Club Off','要確認','掲載がある場合だけ確認']],u:'注文前に公式アプリのクーポン番号を確認。',w:'対象メニュー・時間帯限定に注意。'},'無印良品':{a:['無印','muji'],type:'shop',s:[['MUJI passport','可能性あり','会員証、マイル、クーポンを確認'],['商業施設アプリ','可能性あり','施設優待を確認'],['決済アプリクーポン','要確認','支払い前に確認']],u:'会計前にMUJI passportと施設アプリを確認。',w:'店舗とネットで条件が違う場合あり。'},'横浜・八景島シーパラダイス':{a:['八景島','シーパラ','八景島シーパラダイス','hakkeijima'],type:'tourism',s:[['公式サイト前売り / Webチケット','可能性あり','公式の前売り券・Webチケット・セット券を確認'],['アソビュー！','可能性あり','入場券・前売り券・割引プランの掲載を確認'],['JAF会員優待','要確認','JAFナビで施設名検索'],['Club Off / ベネフィット・ステーション','要確認','会員サイトログイン後に施設名検索'],['Klook / じゃらん遊び・体験','要確認','外部予約サイトの掲載を確認']],u:'チケット購入前に公式前売り、アソビュー、JAF、Club Off系を確認。',w:'現地窓口購入後は使えない優待があるため、購入前に確認。'},'新江ノ島水族館':{a:['えのすい','江ノ島水族館','新えのしま水族館'],type:'tourism',s:[['公式サイト / Webチケット','可能性あり','公式チケット・年間パス・キャンペーンを確認'],['アソビュー！','可能性あり','前売り券や割引プランを確認'],['JAF会員優待','要確認','JAFナビで施設名検索'],['Club Off / ベネフィット・ステーション','要確認','会員優待サイトで確認']],u:'来館前に前売り券サイトと会員優待を確認。',w:'日付指定・キャンセル条件・窓口提示条件に注意。'},'よみうりランド':{a:['読売ランド','yomiuriland'],type:'tourism',s:[['公式サイト / 前売り券','可能性あり','公式ワンデーパス・イベント券を確認'],['アソビュー！','可能性あり','前売り券や割引プランを確認'],['JAF会員優待','要確認','JAFナビで確認'],['Club Off / ベネフィット・ステーション','要確認','会員優待サイトで確認']],u:'入園前に公式前売り、アソビュー、会員優待を確認。',w:'イベント日・ナイト営業・乗り物券条件に注意。'},'サンリオピューロランド':{a:['ピューロランド','sanrio puroland'],type:'tourism',s:[['公式サイト / パスポート','可能性あり','公式チケット、来場予約、キャンペーンを確認'],['アソビュー！','可能性あり','前売り券やプランを確認'],['JAF / Club Off','要確認','会員優待の掲載有無を確認'],['コンビニ前売り券','要確認','前売り券の有無を確認']],u:'来場予約や日付指定の条件を先に確認。',w:'日付指定・入場制限・キャンセル条件に注意。'},'東京タワー':{a:['tokyo tower','展望台'],type:'tourism',s:[['公式サイト / Webチケット','可能性あり','展望台Webチケットやセット券を確認'],['アソビュー！','可能性あり','展望台チケット掲載を確認'],['JAF / Club Off','要確認','施設名で優待検索'],['Klook','要確認','訪日/観光チケット掲載を確認']],u:'入場券購入前にWebチケットと会員優待を確認。',w:'日時指定・セット券・当日券との価格差に注意。'},'東京スカイツリー':{a:['スカイツリー','tokyo skytree'],type:'tourism',s:[['公式サイト / Webチケット','可能性あり','日時指定券・セット券を確認'],['アソビュー！ / Klook','可能性あり','外部チケット掲載を確認'],['JAF / Club Off','要確認','会員優待の掲載有無を確認']],u:'展望台チケット購入前に公式Webと外部チケットを比較。',w:'日時指定、キャンセル条件、当日券との差額に注意。'}};const TOUR={name:'観光・入場料施設',p:{type:'tourism',s:[['公式サイト / 公式前売り券','可能性あり','公式サイトの前売り券・Webチケット・セット券を確認'],['アソビュー！','可能性あり','入場券・体験チケット・割引プランを確認'],['JAF会員優待','要確認','JAFナビで施設名検索'],['Club Off / ベネフィット・ステーション / リロクラブ','要確認','福利厚生サイトにログインして施設名検索'],['Klook / じゃらん遊び・体験','要確認','外部予約サイトの掲載を確認'],['コンビニ前売り券 / カード優待','要確認','セブンチケット等やカード優待を確認']],u:'入場券を買う前に、公式前売り、アソビュー、JAF、Club Off系、外部予約サイトの順で確認。',w:'現地で支払った後に使えない優待が多いので、購入前確認が必須です。'}};function norm(v){return(v||'').toString().toLowerCase().normalize('NFKC').replace(/[\s　・･ー‐‑–—―\-_’'`.]/g,'')}function esc(s){return(s||'').toString().replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function statusOf(p){let a=(p?.s||[]).map(x=>x[1]);return a.includes('あり')?'あり':a.includes('可能性あり')?'可能性あり':'要確認'}function cls(st){return st==='あり'?'has':st==='可能性あり'?'maybe':'manual'}function profile(t){let x=norm(t),best=null,score=0;for(const[k,p]of Object.entries(P)){for(const a of[k,...p.a]){let y=norm(a),s=x===y?100:(x.includes(y)||y.includes(x)?y.length:0);if(s>score){score=s;best={name:k,p}}}}return score?best:null}function meter(a,b,c,d){const R=6371000,rad=x=>x*Math.PI/180,q=Math.sin(rad(c-a)/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(rad(d-b)/2)**2;return Math.round(R*2*Math.atan2(Math.sqrt(q),Math.sqrt(1-q)))}function msg(t,c=''){status.className='status '+c;status.textContent=t}function qPart(r,lat,lng,kind){let a=[];if(kind!=='tourism')a.push(`node(around:${r},${lat},${lng})['name']['shop'];way(around:${r},${lat},${lng})['name']['shop'];relation(around:${r},${lat},${lng})['name']['shop'];node(around:${r},${lat},${lng})['name']['amenity'~'^(restaurant|fast_food|cafe|food_court|ice_cream|cinema|pharmacy)$'];way(around:${r},${lat},${lng})['name']['amenity'~'^(restaurant|fast_food|cafe|food_court|ice_cream|cinema|pharmacy)$'];relation(around:${r},${lat},${lng})['name']['amenity'~'^(restaurant|fast_food|cafe|food_court|ice_cream|cinema|pharmacy)$'];`);if(kind!=='shop')a.push(`node(around:${r},${lat},${lng})['name']['tourism'~'^(attraction|museum|aquarium|zoo|theme_park|viewpoint|gallery)$'];way(around:${r},${lat},${lng})['name']['tourism'~'^(attraction|museum|aquarium|zoo|theme_park|viewpoint|gallery)$'];relation(around:${r},${lat},${lng})['name']['tourism'~'^(attraction|museum|aquarium|zoo|theme_park|viewpoint|gallery)$'];node(around:${r},${lat},${lng})['name']['leisure'~'^(water_park|amusement_arcade|bowling_alley|sauna|sports_centre|fitness_centre)$'];way(around:${r},${lat},${lng})['name']['leisure'~'^(water_park|amusement_arcade|bowling_alley|sauna|sports_centre|fitness_centre)$'];relation(around:${r},${lat},${lng})['name']['leisure'~'^(water_park|amusement_arcade|bowling_alley|sauna|sports_centre|fitness_centre)$'];`);return a.join('')}async function overpass(lat,lng,r){let q=`[out:json][timeout:25];(${qPart(r,lat,lng,target.value)});out center tags;`;for(const ep of EP){try{let ac=new AbortController(),to=setTimeout(()=>ac.abort(),25000),res=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},body:'data='+encodeURIComponent(q),signal:ac.signal});clearTimeout(to);if(res.ok)return await res.json()}catch(e){}}throw Error('api')}function kind(t){if(t.tourism||t.leisure)return'tourism';if(t.amenity==='cinema')return'tourism';return'shop'}function icon(t){if(kind(t)==='tourism')return'🎡';if(t.shop)return'🛒';if(t.amenity==='pharmacy')return'💊';return'🍔'}function build(osm,lat,lng,r){let map=new Map();for(const e of osm.elements||[]){let t=e.tags||{},name=t.name||t.brand;if(!name)continue;let la=e.lat??e.center?.lat,lo=e.lon??e.center?.lon;if(typeof la!=='number'||typeof lo!=='number')continue;let d=meter(lat,lng,la,lo);if(d>r)continue;let k=kind(t);if(target.value==='shop'&&k==='tourism')continue;if(target.value==='tourism'&&k!=='tourism')continue;let pr=profile([name,t.brand,t.operator].filter(Boolean).join(' '));if(!pr&&k==='tourism')pr=TOUR;let display=pr?.name||name,key=norm(display)+'_'+Math.round(la*10000)+'_'+Math.round(lo*10000);if(!map.has(key)||d<map.get(key).d)map.set(key,{name,display,osm:name,d,pr,ic:icon(t),k})}return[...map.values()].sort((a,b)=>(statusOf(b.pr?.p||b.pr)==='あり')-(statusOf(a.pr?.p||a.pr)==='あり')||a.d-b.d).slice(0,28)}function renderBubbles(list){bubbles.innerHTML=list.length?list.map((x,i)=>{let p=x.pr?.p||x.pr,st=statusOf(p),cl=cls(st);return `<button class='bubble ${x.pr?'hit':''} ${x.k==='tourism'?'tour':''}' data-i='${i}'><span>${x.ic} <span class='nm ${cl}'>${esc(x.display)}</span> ${x.d}m <span class='pill ${cl}'>${st}</span></span>${norm(x.display)!==norm(x.osm)?`<small>地図上の名称：${esc(x.osm)}</small>`:''}</button>`}).join(''):`<div>候補が見つかりませんでした。半径を広げるか店舗名検索を使ってください。</div>`;document.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>show(list[+b.dataset.i]))}function show(x){let pr=x.pr||profile(x.display||x)||((target.value==='tourism'||x.k==='tourism')?TOUR:null),name=pr?.name||x.display||x,p=pr?.p||pr,src=p?.s||[['公式アプリ / 公式サイト','要確認','店舗公式アプリ、公式サイト、店頭掲示を確認'],['決済アプリクーポン','要確認','支払い前に確認'],['JAF / Club Off','要確認','掲載がある場合だけ確認']],st=statusOf(p),cl=cls(st);result.innerHTML=`<div class='result'><h2>選択：<span class='nm ${cl}'>${esc(name)}</span></h2>${x.d?`<span class='pill'>距離：${x.d}m</span>`:''}<div class='summary'><b>有無ステータス:</b>${src.map((s,i)=>`<div class='src'><b>${i+1}位：${esc(s[0])}</b><span class='pill ${cls(s[1])}'>${esc(s[1])}</span><br>${esc(s[2])}</div>`).join('')}<div class='src'><b>使い方</b><br>${esc(p?.u||'会計前・購入前に公式サイト、アプリ、会員優待を順番に確認してください。')}</div><div class='src'><b>注意</b><br>${esc(p?.w||'クーポンが常にあるとは限りません。購入前に条件を確認してください。')}</div></div></div>`;q.value=name;result.scrollIntoView({behavior:'smooth'})}async function searchNear(){if(!navigator.geolocation){msg('このブラウザは位置情報に対応していません。店舗名検索を使ってください。','err');return}let r=+radius.value;msg('📍 位置情報を取得中です。ブラウザの許可ダイアログが出たら許可してください。','warn');bubbles.innerHTML='';navigator.geolocation.getCurrentPosition(async p=>{let lat=p.coords.latitude,lng=p.coords.longitude;msg(`📡 現在地を取得しました。${r}m以内を探しています。`,'ok');try{renderBubbles(build(await overpass(lat,lng,r),lat,lng,r));msg(`📡 ${r}m以内の候補を表示しています。今いる場所を選んでください。`,'ok')}catch(e){msg('候補の取得に失敗しました。手入力検索を使ってください。','err')}},e=>msg({1:'位置情報の許可が拒否されました。店舗名検索を使ってください。',2:'現在地を特定できませんでした。屋内や地下では失敗することがあります。',3:'位置情報取得がタイムアウトしました。もう一度試すか、店舗名検索を使ってください。'}[e.code]||'位置情報を取得できませんでした。','err'),{enableHighAccuracy:true,timeout:10000,maximumAge:0})}function manualSearch(){let p=profile(q.value)||((/水族館|動物園|博物館|美術館|遊園地|テーマパーク|観光|展望台|温浴|入場料/.test(q.value))?TOUR:null);p?show({display:p.name,pr:p,k:p.p?.type||p.p?.type}):msg('登録済みの具体候補がありません。施設名やジャンル名を変えて検索してください。','warn')}chips.innerHTML=['マック','ローソン','サンドラッグ','無印','八景島','水族館','動物園','遊園地','温浴','展望台','アソビュー','JAF'].map(x=>`<button class='chip'>${x}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{q.value=b.textContent;manualSearch()});locTop.onclick=near.onclick=searchNear;goLoc.onclick=()=>{searchBox.scrollIntoView({behavior:'smooth'});searchNear()};manualBtn.onclick=manualSearch;goSearch.onclick=()=>{q.focus();searchBox.scrollIntoView({behavior:'smooth'})};q.addEventListener('keydown',e=>{if(e.key==='Enter')manualSearch()});</script></body></html>
