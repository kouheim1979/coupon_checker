<!doctype html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>クーポンチェッカー</title><style>:root{--bg:#FFFDE7;--p:#FF2D6B;--c:#00E5FF;--y:#FFE600;--g:#9CFF97;--d:#1A1A1A;--b:3px solid #1A1A1A;--s:5px 5px 0 #1A1A1A}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:system-ui,'Noto Sans JP',sans-serif;font-weight:800;color:var(--d)}.app{max-width:920px;margin:auto;padding:12px 12px 110px}.top{position:sticky;top:0;z-index:5;margin:0 -12px;padding:12px;background:var(--p);border-bottom:4px solid var(--d);color:#fff}.bar{display:flex;justify-content:space-between;gap:10px;align-items:center}.ttl{font-size:28px;text-shadow:2px 2px #000}.box,.card,.btn,input,select,.bubble,.result,.bottom button,.bottom a{border:var(--b);border-radius:12px;box-shadow:var(--s);background:#fff}.hero{background:var(--p);color:#fff}.box{padding:14px;margin-top:14px}.hero h1{margin:0 0 8px;font-size:28px;text-shadow:2px 2px #000}.btn{min-height:48px;padding:10px 14px;background:var(--c);font-weight:900}.search{display:flex;gap:8px}.search input{width:100%;min-height:52px;padding:12px;font-size:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}select{min-height:52px;padding:12px}.chips,.bubbles{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.chip,.bubble{padding:10px 12px}.chip{background:var(--y)}.bubble{text-align:left;font-weight:900}.bubble.hit{background:var(--g)}.bubble small{display:block;font-size:12px;margin-top:3px}.status{padding:10px;margin-top:10px}.ok{background:#E8FBFF}.warn{background:#fff6c4}.err{background:#FFB3C7}.pill{display:inline-block;border:2px solid var(--d);border-radius:999px;padding:2px 8px;background:var(--y);font-size:12px}.pill.okp{background:var(--g)}.result{padding:14px;margin-top:14px}.result h2{margin:0 0 8px;font-size:24px}.src{border:2px solid var(--d);border-radius:10px;padding:10px;margin-top:8px;background:#fffdf5;line-height:1.6}.bottom{position:fixed;left:0;right:0;bottom:0;max-width:920px;margin:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:rgba(255,253,231,.96);border-top:4px solid var(--d);padding:8px}.bottom button,.bottom a{text-align:center;padding:10px;color:var(--d);text-decoration:none;font-weight:900}.bottom a{background:var(--p);color:#fff}@media(max-width:520px){.grid{grid-template-columns:1fr}.ttl{font-size:22px}.bubble{width:100%}}</style></head><body><div class='app'><header class='top'><div class='bar'><div><div class='ttl'>🎟️ クーポンチェッカー</div><div>支払い前に見る優待入口</div></div><button class='btn' id='locTop'>📍 現在地から探す</button></div></header><section class='box hero'><h1>この店、先に何を見る？</h1><p>公式アプリ → 会員優待 → 決済クーポン → 支払いチェッカーの順で確認します。</p></section><section class='box'><div class='search'><input id='q' placeholder='例：マック、ガスト、無印、オーケー、ロピア'><button class='btn' id='manual'>検索</button></div><div class='grid'><label>検索半径<select id='radius'><option value='120'>120m：今いる建物付近</option><option value='250' selected>250m：近くのお店</option><option value='500'>500m：駅前・商業施設向け</option><option value='800'>800m：広めに探す</option></select></label><button class='btn' id='near'>📍 現在地から探す</button></div><div id='status' class='status'>未取得。現在地を許可すると、近くの店舗候補を表示します。</div><div id='bubbles' class='bubbles'></div><div class='chips' id='chips'></div></section><section id='result'></section></div><nav class='bottom'><button id='goSearch'>🔎<br>検索</button><button id='goLoc'>📍<br>現在地</button><a href='https://kouheim1979.github.io/' target='_blank'>💳<br>支払いへ</a></nav><script>const EP=['https://overpass-api.de/api/interpreter','https://overpass.kumi.systems/api/interpreter'];const P={'マクドナルド':{a:['マック','マクド','mcdonalds'],s:[['マクドナルド公式アプリ','アプリクーポンとモバイルオーダー適用可否を確認'],['SmartNewsクーポン','掲載されることがあるため確認'],['Yahoo! JAPANアプリ / LINEクーポン','不定期掲載の確認候補'],['決済アプリクーポン','支払い前に確認']],u:'注文前に公式アプリのクーポンを確認。',w:'時間限定・モバイルオーダー限定に注意。'},'ローソン':{a:['lawson'],s:[['ローソンアプリ','アプリクーポンとお試し引換券を確認'],['Ponta / dポイント','ポイントカード提示前に確認'],['決済アプリクーポン','支払い前に確認']],u:'会計前にローソンアプリを確認。',w:'対象商品限定・先着に注意。'},'セブン-イレブン':{a:['セブン','セブンイレブン','7eleven'],s:[['セブン-イレブンアプリ','会員コードとクーポンを確認'],['LINEクーポン / Yahoo! JAPANアプリ','不定期掲載の確認候補'],['決済アプリクーポン','支払い前に確認']],u:'会計前にアプリの会員コードとクーポンを確認。',w:'対象商品限定・提示順に注意。'},'ファミリーマート':{a:['ファミマ','famima'],s:[['ファミペイ','ファミペイクーポンを確認'],['Vポイント / 楽天ポイント / dポイント','提示ポイントとキャンペーンを確認'],['決済アプリクーポン','支払い前に確認']],u:'会計前にファミペイを確認。',w:'ファミペイ払い限定に注意。'},'ウエルシア':{a:['ウェルシア','welcia'],s:[['ウエルシアグループアプリ','アプリクーポンと会員証を確認'],['Vポイント / WAON POINT','ポイント条件を確認'],['決済アプリクーポン','支払い前に確認']],u:'公式アプリ、ポイント、決済クーポンの順で確認。',w:'ポイント倍率日と併用条件に注意。'},'サンドラッグ':{a:['サンドラ','sundrug'],s:[['サンドラッグ公式アプリ','アプリクーポンと会員バーコードを確認'],['JAF会員優待','JAFナビで店名検索'],['Club Off','ログイン後にカテゴリ検索'],['決済アプリクーポン','支払い前に確認']],u:'レジ前に公式アプリ、会員証、決済クーポンを確認。',w:'アプリ内限定・店舗限定に注意。'},'ガスト':{a:['すかいらーく','gusto'],s:[['すかいらーくアプリ','クーポン番号を確認'],['SmartNews / Yahoo! JAPANアプリ','不定期掲載の確認候補'],['JAF / Club Off','掲載がある場合だけ確認']],u:'注文前に公式アプリのクーポン番号を確認。',w:'対象メニュー・時間帯限定に注意。'},'丸亀製麺':{a:['丸亀','marugame'],s:[['丸亀製麺公式アプリ','アプリクーポンを確認'],['SmartNews / Yahoo! JAPANアプリ','不定期掲載の確認候補'],['決済アプリクーポン','支払い前に確認']],u:'レジ前に公式アプリを開く。',w:'会計前提示と併用条件に注意。'},'無印良品':{a:['無印','muji'],s:[['MUJI passport','会員証、マイル、クーポンを確認'],['商業施設アプリ','施設優待を確認'],['決済アプリクーポン','支払い前に確認']],u:'会計前にMUJI passportと施設アプリを確認。',w:'店舗とネットで条件が違う場合あり。'},'オーケー':{a:['ok','okストア','オーケーストア'],s:[['オーケークラブ会員','会員割引条件を確認'],['店舗掲示 / チラシ','店頭価格と支払い条件を確認']],u:'会員カード条件と支払い条件を確認。',w:'決済方法で条件が変わる場合あり。'},'ロピア':{a:['lopia'],s:[['店舗掲示 / 公式情報','チラシと支払い条件を確認'],['商業施設アプリ','施設優待を確認']],u:'来店前にチラシ、店頭掲示、支払い条件を確認。',w:'店舗ごとに支払い手段が違う場合あり。'}};function norm(v){return(v||'').toString().toLowerCase().normalize('NFKC').replace(/[\s　・･ー‐‑–—―\-_’'`.]/g,'')}function esc(s){return(s||'').toString().replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function profile(t){let x=norm(t),best=null,score=0;for(const[k,p]of Object.entries(P)){for(const a of[k,...p.a]){let y=norm(a),s=x===y?100:(x.includes(y)||y.includes(x)?y.length:0);if(s>score){score=s;best={name:k,p}}}}return score?best:null}function meter(a,b,c,d){const R=6371000,rad=x=>x*Math.PI/180,q=Math.sin(rad(c-a)/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(rad(d-b)/2)**2;return Math.round(R*2*Math.atan2(Math.sqrt(q),Math.sqrt(1-q)))}function msg(t,c=''){status.className='status '+c;status.textContent=t}async function overpass(lat,lng,r){let q=`[out:json][timeout:25];(node(around:${r},${lat},${lng})['name']['shop'];way(around:${r},${lat},${lng})['name']['shop'];relation(around:${r},${lat},${lng})['name']['shop'];node(around:${r},${lat},${lng})['name']['amenity'~'^(restaurant|fast_food|cafe|food_court|ice_cream|cinema|pharmacy)$'];way(around:${r},${lat},${lng})['name']['amenity'~'^(restaurant|fast_food|cafe|food_court|ice_cream|cinema|pharmacy)$'];relation(around:${r},${lat},${lng})['name']['amenity'~'^(restaurant|fast_food|cafe|food_court|ice_cream|cinema|pharmacy)$'];);out center tags;`;for(const ep of EP){try{let ac=new AbortController(),to=setTimeout(()=>ac.abort(),25000),res=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},body:'data='+encodeURIComponent(q),signal:ac.signal});clearTimeout(to);if(res.ok)return await res.json()}catch(e){}}throw Error('api')}function icon(t){if(t.shop)return'🛒';if(t.amenity==='pharmacy')return'💊';if(t.amenity==='cinema')return'🎬';return'🍔'}function build(osm,lat,lng,r){let map=new Map();for(const e of osm.elements||[]){let t=e.tags||{},name=t.name||t.brand;if(!name)continue;let la=e.lat??e.center?.lat,lo=e.lon??e.center?.lon;if(typeof la!=='number'||typeof lo!=='number')continue;let d=meter(lat,lng,la,lo);if(d>r)continue;let pr=profile([name,t.brand,t.operator].filter(Boolean).join(' ')),display=pr?.name||name,key=norm(display)+'_'+Math.round(la*10000)+'_'+Math.round(lo*10000);if(!map.has(key)||d<map.get(key).d)map.set(key,{name,display,osm:name,d,pr,ic:icon(t)})}return[...map.values()].sort((a,b)=>(!!b.pr-!!a.pr)||a.d-b.d).slice(0,24)}function renderBubbles(list){bubbles.innerHTML=list.length?list.map((x,i)=>`<button class='bubble ${x.pr?'hit':''}' data-i='${i}'><span>${x.ic} ${esc(x.display)} ${x.d}m <span class='pill ${x.pr?'okp':'m'}'>${x.pr?'クーポン候補あり':'要確認'}</span></span>${norm(x.display)!==norm(x.osm)?`<small>地図上の名称：${esc(x.osm)}</small>`:''}</button>`).join(''):`<div>店舗らしい候補が見つかりませんでした。半径を広げるか店舗名検索を使ってください。</div>`;document.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>show(list[+b.dataset.i]))}function show(x){let pr=x.pr||profile(x.display||x),name=pr?.name||x.display||x,p=pr?.p,src=p?.s||[['公式アプリ / 公式サイト','店舗公式アプリ、公式サイト、店頭掲示を確認'],['決済アプリクーポン','支払い前に確認'],['JAF / Club Off','掲載がある場合だけ確認']];result.innerHTML=`<div class='result'><h2>選択店舗：${esc(name)}</h2><span class='pill okp'>具体的な確認候補あり</span> ${x.d?`<span class='pill'>距離：${x.d}m</span>`:''}<div class='summary'><b>クーポン確認順:</b>${src.map((s,i)=>`<div class='src'><b>${i+1}位：${esc(s[0])}</b><br>${esc(s[1])}</div>`).join('')}<div class='src'><b>使い方</b><br>${esc(p?.u||'会計前に公式アプリ、公式サイト、決済アプリ、会員優待を順番に確認してください。')}</div><div class='src'><b>注意</b><br>${esc(p?.w||'クーポンが常にあるとは限りません。店舗限定・時間限定・併用条件を確認してください。')}</div></div></div>`;q.value=name;localStorage.setItem('lastSelectedCouponStore',name);result.scrollIntoView({behavior:'smooth'})}async function searchNear(){if(!navigator.geolocation){msg('このブラウザは位置情報に対応していません。店舗名検索を使ってください。','err');return}let r=+radius.value;msg('📍 位置情報を取得中です。ブラウザの許可ダイアログが出たら許可してください。','warn');bubbles.innerHTML='';navigator.geolocation.getCurrentPosition(async p=>{let lat=p.coords.latitude,lng=p.coords.longitude;msg(`📡 現在地を取得しました。${r}m以内の店舗だけを探しています。`,'ok');try{renderBubbles(build(await overpass(lat,lng,r),lat,lng,r));msg(`📡 ${r}m以内の店舗候補を表示しています。今いる店舗を選んでください。`,'ok')}catch(e){msg('周辺店舗候補の取得に失敗しました。店舗名検索を使ってください。','err')}},e=>msg({1:'位置情報の許可が拒否されました。店舗名検索を使ってください。',2:'現在地を特定できませんでした。屋内や地下では失敗することがあります。',3:'位置情報取得がタイムアウトしました。もう一度試すか、店舗名検索を使ってください。'}[e.code]||'位置情報を取得できませんでした。店舗名検索を使ってください。','err'),{enableHighAccuracy:true,timeout:10000,maximumAge:0})}function manual(){let p=profile(q.value);p?show({display:p.name,pr:p}):msg('登録済みの具体クーポン候補がありません。店舗名を変えて検索してください。','warn')}chips.innerHTML=['マック','ローソン','セブン','ファミマ','ウエルシア','サンドラッグ','ガスト','丸亀','無印','オーケー','ロピア'].map(x=>`<button class='chip'>${x}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{q.value=b.textContent;manual()});locTop.onclick=near.onclick=searchNear;goLoc.onclick=()=>{searchBox.scrollIntoView({behavior:'smooth'});searchNear()};manual.onclick=manual;goSearch.onclick=()=>{q.focus();searchBox.scrollIntoView({behavior:'smooth'})};q.addEventListener('keydown',e=>{if(e.key==='Enter')manual()});</script></body></html>
